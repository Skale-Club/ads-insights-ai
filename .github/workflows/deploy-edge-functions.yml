name: Deploy Edge Functions

on:
  workflow_dispatch:
    inputs:
      function:
        description: "Function name to deploy (empty = all listed below)"
        required: false
        default: ""
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - "supabase/config.toml"
      - ".github/workflows/deploy-edge-functions.yml"

concurrency:
  group: deploy-edge-functions
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: aqcxpcvymjzjxrpgwwsq
    steps:
      - uses: actions/checkout@v4

      - name: Verify access token secret
        run: |
          if [ -z "${SUPABASE_ACCESS_TOKEN:-}" ]; then
            echo "Missing secret SUPABASE_ACCESS_TOKEN (generate at https://supabase.com/dashboard/account/tokens)."
            exit 1
          fi

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy functions
        run: |
          set -euo pipefail
          target="${{ github.event.inputs.function }}"
          functions=(healthcheck)
          if [ -n "$target" ]; then
            functions=("$target")
          fi
          for fn in "${functions[@]}"; do
            echo "::group::Deploy $fn"
            supabase functions deploy "$fn" --project-ref "$PROJECT_REF" --no-verify-jwt
            echo "::endgroup::"
          done
