name: Supabase Keepalive

on:
  schedule:
    - cron: "13 3 * * *"
    - cron: "13 15 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - name: Multi-surface Supabase ping
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY || secrets.SUPABASE_SERVICE_KEY }}
        run: |
          set -u

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_ANON_KEY:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "Missing GitHub secrets. Required: SUPABASE_URL, SUPABASE_ANON_KEY, SUPABASE_SERVICE_ROLE_KEY."
            exit 1
          fi

          base="${SUPABASE_URL%/}"
          failures=0

          ping() {
            local label="$1"; shift
            local expected="$1"; shift
            local body_file
            body_file="$(mktemp)"

            local status
            status=$(curl -sS -o "$body_file" -w "%{http_code}" "$@" || echo "000")

            local body
            body="$(head -c 300 "$body_file")"
            rm -f "$body_file"

            echo "[$label] HTTP $status"
            echo "[$label] body: $body"

            if ! [[ "$status" =~ ^[0-9]{3}$ ]] || [ "$status" != "$expected" ]; then
              echo "[$label] FAIL (expected $expected)"
              failures=$((failures + 1))
            else
              echo "[$label] OK"
            fi
            echo "---"
          }

          # 1. Auth surface — anon settings endpoint (simulates client bootstrap)
          ping "auth-settings" 200 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${base}/auth/v1/settings"

          # 2. REST read — heartbeat table via anon (RLS blocks rows but request hits PostgREST)
          ping "rest-read" 200 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${base}/rest/v1/project_keepalive_heartbeat?select=id&limit=1"

          # 3. REST write — service-role RPC updates heartbeat row
          ping "rest-rpc" 204 \
            -X POST \
            -H "apikey: ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d '{}' \
            "${base}/rest/v1/rpc/touch_project_keepalive"

          # 4. Edge Function — healthcheck keeps Functions runtime warm
          ping "edge-fn" 200 \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}" \
            "${base}/functions/v1/healthcheck"

          if [ "$failures" -gt 0 ]; then
            echo "Keepalive finished with $failures failure(s)."
            exit 1
          fi

          echo "All surfaces pinged successfully."
